<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Kasse</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #141008;
      color: #f0ead6;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── TOP: Kasse ── */

    #kasse {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #f5c842;
    }

    #btn-reset {
      background: rgba(255, 80, 80, 0.15);
      border: 1px solid rgba(255, 80, 80, 0.3);
      border-radius: 8px;
      color: #ff7070;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }

    /* Cart */

    #cart-empty {
      color: #3a3020;
      font-size: 13px;
      text-align: center;
      padding: 16px 0;
    }

    #cart-items {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .cart-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 6px 10px;
    }

    .cart-emoji {
      font-size: 16px;
      flex-shrink: 0;
    }

    .cart-info {
      flex: 1;
      min-width: 0;
    }

    .cart-name {
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cart-sub {
      font-size: 11px;
      color: #7a7060;
    }

    .cart-price {
      font-size: 11px;
      color: #f5c842;
    }

    .cart-controls {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    /* Pfand Felder */

    .pfand-box {
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(245, 200, 66, 0.07);
      border: 1px solid rgba(245, 200, 66, 0.2);
    }

    .pfand-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .pfand-zurueck .pfand-label {
      color: #f5c842;
    }

    .pfand-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pfand-count {
      font-size: 22px;
      font-weight: 900;
      min-width: 28px;
      text-align: center;
    }

    .pfand-zurueck .pfand-count {
      color: #f5c842;
    }

    .pfand-unit {
      font-size: 12px;
      color: #7a7060;
    }

    .pfand-amount {
      margin-left: auto;
      font-size: 14px;
      font-weight: 800;
    }

    .pfand-zurueck .pfand-amount {
      color: #f5c842;
    }

    /* Total */

    #total-box {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #total-breakdown {
      font-size: 10px;
      color: #7a7060;
    }

    #total-amount {
      font-size: 26px;
      font-weight: 900;
      color: #f5c842;
      line-height: 1;
    }

    .quick-btns {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .quick-btn {
      background: rgba(255, 255, 255, 0.08);
      border: none;
      border-radius: 6px;
      color: #f0ead6;
      padding: 5px 9px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }

    #btn-passend {
      background: #f5c842;
      border: none;
      border-radius: 6px;
      color: #1a1408;
      padding: 5px 9px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    /* Eingabe */

    #eingabe-row {
      display: flex;
      gap: 6px;
    }

    #input-gegeben {
      flex: 1;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #f0ead6;
      font-size: 20px;
      padding: 8px 12px;
      font-family: inherit;
    }

    #btn-ok {
      background: #f5c842;
      color: #1a1408;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-weight: 900;
      font-size: 20px;
      cursor: pointer;
    }

    #rueckgeld-box {
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      display: none;
    }

    #rueckgeld-label {
      font-size: 11px;
      color: #a89f88;
    }

    #rueckgeld-amount {
      font-size: 32px;
      font-weight: 900;
    }

    /* ── BOTTOM: Getränke ── */

    #getraenke {
      flex-shrink: 0;
      height: 50dvh;
      background: #1a1208;
      display: flex;
      flex-direction: column;
      border-top: 2px solid rgba(245, 200, 66, 0.25);
    }

    #tabs {
      display: flex;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .tab-btn {
      flex: 1;
      padding: 9px 4px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 11px;
      white-space: nowrap;
      background: transparent;
      color: #5a5040;
      border-bottom: 2px solid transparent;
    }

    .tab-btn.active {
      color: #f5c842;
      border-bottom: 2px solid #f5c842;
    }

    #items-grid {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      align-content: start;
    }

    .item-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 10px;
      color: #f0ead6;
      padding: 8px 4px;
      cursor: pointer;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .item-btn:active {
      background: rgba(245, 200, 66, 0.15);
      border-color: rgba(245, 200, 66, 0.3);
    }

    .item-emoji {
      font-size: 20px;
    }

    .item-name {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
    }

    .item-size {
      font-size: 10px;
      color: #5a5040;
    }

    .item-price {
      font-size: 13px;
      font-weight: 900;
      color: #f5c842;
      margin-top: 2px;
    }

    /* +/- Buttons */

    .qbtn {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.07);
      color: #f0ead6;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      line-height: 1;
    }
  </style>
</head>

<body>
  <!-- KASSE -->

  <div id="kasse">
    <div class="header">
      <div class="title">🍺 Kasse</div>
      <button id="btn-reset" onclick="reset()">🗑 Reset</button>
    </div>

    <div id="cart-empty">Noch nix — unten Getränke tippen 👇</div>
    <div id="cart-items"></div>

    <!-- Pfand zurück -->

    <div class="pfand-box pfand-zurueck">
      <div class="pfand-label">
        Pfand zurückgebracht (wird abgezogen)
      </div>

      <div class="pfand-row">
        <button class="qbtn" onclick="changePfandZurueck(-1)">−</button>

        <span class="pfand-count" id="pfand-zurueck-count">0</span>

        <button class="qbtn" onclick="changePfandZurueck(1)">+</button>

        <span class="pfand-unit">Stück × 3,00 €</span>

        <span class="pfand-amount" id="pfand-zurueck-amount"></span>
      </div>
    </div>

    <!-- Total -->

    <div id="total-box">
      <div>
        <div id="total-breakdown"></div>
        <div id="total-amount">0,00 €</div>
      </div>

      <div class="quick-btns">
        <button class="quick-btn" onclick="setGegeben(5)">5€</button>
        <button class="quick-btn" onclick="setGegeben(10)">10€</button>
        <button class="quick-btn" onclick="setGegeben(20)">20€</button>
        <button class="quick-btn" onclick="setGegeben(50)">50€</button>
        <button id="btn-passend" onclick="setPassend()">Passend</button>
      </div>
    </div>

    <!-- Eingabe -->

    <div id="eingabe-row">
      <input
        id="input-gegeben"
        type="number"
        inputmode="decimal"
        placeholder="Gegeben €"
        oninput="onPaidInput()"
      />

      <button id="btn-ok" onclick="calcChange()">✓</button>
    </div>

    <div id="rueckgeld-box">
      <div id="rueckgeld-label"></div>
      <div id="rueckgeld-amount"></div>
    </div>
  </div>

  <!-- GETRÄNKE -->

  <div id="getraenke">
    <div id="tabs">
      <button class="tab-btn active" onclick="setTab('bier', this)">
        🍺 Bier
      </button>

      <button class="tab-btn" onclick="setTab('wein', this)">
        🍷 Wein
      </button>

      <button class="tab-btn" onclick="setTab('schnaps', this)">
        🥃 Schnaps
      </button>

      <button class="tab-btn" onclick="setTab('soft', this)">
        🥤 Soft
      </button>
    </div>

    <div id="items-grid"></div>
  </div>

  <script>
    const ITEMS = {
      bier: [
        { id: "b1", name: "Pils", size: "0,5 L", price: 3.50, pfand: true, emoji: "🍺" },
        { id: "b2", name: "Radler", size: "0,5 L", price: 3.50, pfand: true, emoji: "🍋" },
        { id: "b3", name: "Keiler Weizen", size: "0,5 L", price: 3.50, pfand: true, emoji: "🌾" },
        { id: "b4", name: "Erdinger AF", size: "0,5 L", price: 3.50, pfand: true, emoji: "🥤" },
        { id: "b5", name: "Weizen", size: "0,5 L", price: 3.50, pfand: true, emoji: "🍺" },
        { id: "b6", name: "Pils Maß", size: "1,0 L", price: 7.00, pfand: true, emoji: "🍺" },
        { id: "b7", name: "Radler Maß", size: "1,0 L", price: 7.00, pfand: true, emoji: "🍋" },
        { id: "b8", name: "Weizen Maß", size: "1,0 L", price: 7.00, pfand: true, emoji: "🌾" }
      ],

      wein: [
        { id: "w1", name: "Schoppen Wein", size: "0,3 L", price: 3.50, pfand: true, emoji: "🍷" },
        { id: "w2", name: "Weinschorle", size: "0,5 L", price: 5.00, pfand: true, emoji: "🥂" },
        { id: "w3", name: "Schnäpse", size: "2 cl", price: 1.50, pfand: false, emoji: "🥃" },
        { id: "w4", name: "Backhaustropfen", size: "0,7 L", price: 30.00, pfand: true, emoji: "🍾" },
        { id: "w5", name: "Klopfer", size: "Kiste", price: 30.00, pfand: false, emoji: "🎯" }
      ],

      schnaps: [
        { id: "s1", name: "Aperol", size: "0,3 L", price: 5.00, pfand: true, emoji: "🍊" },
        { id: "s2", name: "Mix + Cola", size: "0,2 L", price: 3.00, pfand: true, emoji: "🥃" },
        { id: "s3", name: "Mix + Cola", size: "0,5 L", price: 8.00, pfand: true, emoji: "🥃" },
        { id: "s4", name: "Flasche", size: "0,7 L", price: 40.00, pfand: true, emoji: "🍾" }
      ],

      soft: [
        { id: "af1", name: "Apfelsaft", size: "0,5 L", price: 3.00, pfand: true, emoji: "🍎" },
        { id: "af2", name: "Johannisbeere", size: "0,5 L", price: 3.00, pfand: true, emoji: "🫐" },
        { id: "af3", name: "Zitrolimo", size: "0,5 L", price: 3.00, pfand: true, emoji: "🍋" },
        { id: "af4", name: "Orangelimo", size: "0,5 L", price: 3.00, pfand: true, emoji: "🍊" },
        { id: "af5", name: "Spezi", size: "0,5 L", price: 3.00, pfand: true, emoji: "🥤" },
        { id: "af6", name: "Cola", size: "0,5 L", price: 3.00, pfand: true, emoji: "🥤" },
        { id: "af7", name: "Wasser", size: "0,5 L", price: 3.00, pfand: true, emoji: "💧" }
      ]
    };

    const PFAND = 3.00;

    let cart = [];
    let pfandDrauf = 0;
    let pfandZurueck = 0;
    let currentTab = "bier";

    function fmt(n) {
      return n.toFixed(2).replace(".", ",") + " €";
    }

    // ── Cart ──

    function addToCart(id) {
      const item = Object.values(ITEMS).flat().find(i => i.id === id);
      const existing = cart.find(c => c.id === id);

      if (existing) {
        existing.qty++;
      } else {
        cart.push({ ...item, qty: 1 });
      }

      renderCart();
      updateTotal();
    }

    function changeQty(id, delta) {
      const i = cart.findIndex(c => c.id === id);

      if (i === -1) return;

      cart[i].qty += delta;

      if (cart[i].qty <= 0) {
        cart.splice(i, 1);
      }

      renderCart();
      updateTotal();
    }

    function renderCart() {
      const empty = document.getElementById("cart-empty");
      const items = document.getElementById("cart-items");

      if (cart.length === 0) {
        empty.style.display = "block";
        items.innerHTML = "";
        return;
      }

      empty.style.display = "none";

      items.innerHTML = cart
        .map(c => {
          const pfandHinweis = c.pfand
            ? `<span style="color:#60a0ff;font-size:10px">+Pfand</span>`
            : "";

          const gesamt =
            c.price * c.qty + (c.pfand ? PFAND * c.qty : 0);

          return `
            <div class="cart-row">
              <span class="cart-emoji">${c.emoji}</span>

              <div class="cart-info">
                <div class="cart-name">
                  ${c.name}${pfandHinweis}
                  <span class="cart-sub">${c.size}</span>
                </div>

                <div class="cart-price">
                  ${fmt(gesamt)} (inkl. Pfand)
                </div>
              </div>

              <div class="cart-controls">
                <button class="qbtn" onclick="changeQty('${c.id}',-1)">−</button>

                <span style="font-size:13px;font-weight:800;min-width:18px;text-align:center">
                  ${c.qty}
                </span>

                <button class="qbtn" onclick="changeQty('${c.id}',1)">+</button>
              </div>
            </div>
          `;
        })
        .join("");
    }

    // ── Pfand ──

    function changePfandZurueck(d) {
      pfandZurueck = Math.max(0, pfandZurueck + d);

      document.getElementById("pfand-zurueck-count").textContent =
        pfandZurueck;

      document.getElementById("pfand-zurueck-amount").textContent =
        pfandZurueck > 0
          ? "−" + fmt(pfandZurueck * PFAND)
          : "";

      updateTotal();
    }

    // ── Total ──

    function getTotal() {
      const getraenke = cart.reduce(
        (s, c) => s + c.price * c.qty,
        0
      );

      const pfandAufGetraenke = cart.reduce(
        (s, c) => s + (c.pfand ? PFAND * c.qty : 0),
        0
      );

      const pfandZurueckTotal = pfandZurueck * PFAND;

      const total =
        getraenke + pfandAufGetraenke - pfandZurueckTotal;

      return {
        getraenke,
        pfandAufGetraenke,
        pfandZurueckTotal,
        total
      };
    }

    function updateTotal() {
      const {
        getraenke,
        pfandAufGetraenke,
        pfandZurueckTotal,
        total
      } = getTotal();

      const totalEl = document.getElementById("total-amount");

      if (total < 0) {
        totalEl.textContent =
          "← " + fmt(Math.abs(total)) + " zurückgeben";

        totalEl.style.color = "#50c864";
        totalEl.style.fontSize = "18px";
      } else {
        totalEl.textContent = fmt(total);
        totalEl.style.color = "#f5c842";
        totalEl.style.fontSize = "26px";
      }

      const parts = [];

      if (getraenke > 0) {
        parts.push(`Getränke ${fmt(getraenke)}`);
      }

      if (pfandAufGetraenke > 0) {
        parts.push(`+Pfand ${fmt(pfandAufGetraenke)}`);
      }

      if (pfandZurueckTotal > 0) {
        parts.push(`Pfand zurück −${fmt(pfandZurueckTotal)}`);
      }

      document.getElementById("total-breakdown").textContent =
        parts.join(" · ");

      document.getElementById("rueckgeld-box").style.display =
        "none";
    }

    // ── Bezahlen ──

    function onPaidInput() {
      document.getElementById("rueckgeld-box").style.display =
        "none";
    }

    function setGegeben(v) {
      document.getElementById("input-gegeben").value = v;
      calcChange();
    }

    function setPassend() {
      const { total } = getTotal();

      if (total <= 0) return;

      document.getElementById("input-gegeben").value =
        total.toFixed(2);

      calcChange();
    }

    function calcChange() {
      const { total } = getTotal();

      const box = document.getElementById("rueckgeld-box");
      const lbl = document.getElementById("rueckgeld-label");
      const amt = document.getElementById("rueckgeld-amount");

      if (total < 0) {
        box.style.display = "block";
        box.style.background = "rgba(80,200,100,0.12)";
        box.style.border = "1px solid #50c864";

        lbl.textContent = "Dem Kunden zurückgeben:";

        amt.style.color = "#50c864";
        amt.textContent = fmt(Math.abs(total));

        return;
      }

      const paid = parseFloat(
        document.getElementById("input-gegeben").value
      );

      if (isNaN(paid)) return;

      const change = paid - total;

      box.style.display = "block";

      if (change >= 0) {
        box.style.background = "rgba(80,200,100,0.12)";
        box.style.border = "1px solid #50c864";

        lbl.textContent = "Rückgeld";
        amt.style.color = "#50c864";
      } else {
        box.style.background = "rgba(255,80,80,0.12)";
        box.style.border = "1px solid #ff5050";

        lbl.textContent = "⚠ Zu wenig!";
        amt.style.color = "#ff5050";
      }

      amt.textContent = fmt(Math.abs(change));
    }

    // ── Reset ──

    function reset() {
      cart = [];
      pfandDrauf = 0;
      pfandZurueck = 0;

      document.getElementById("pfand-drauf-count").textContent = "0";
      document.getElementById("pfand-drauf-amount").textContent = "";

      document.getElementById("pfand-zurueck-count").textContent = "0";
      document.getElementById("pfand-zurueck-amount").textContent = "";

      document.getElementById("input-gegeben").value = "";

      document.getElementById("rueckgeld-box").style.display =
        "none";

      renderCart();
      updateTotal();
    }

    // ── Tabs & Grid ──

    function setTab(tab, btn) {
      currentTab = tab;

      document
        .querySelectorAll(".tab-btn")
        .forEach(b => b.classList.remove("active"));

      btn.classList.add("active");

      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById("items-grid");

      grid.innerHTML = ITEMS[currentTab]
        .map(
          item => `
            <button class="item-btn" onclick="addToCart('${item.id}')">
              <span class="item-emoji">${item.emoji}</span>

              <span class="item-name">${item.name}</span>

              <span class="item-size">${item.size}</span>

              <span class="item-price">
                ${fmt(item.price)}

                ${
                  item.pfand
                    ? '<br><span style="font-size:9px;color:#60a0ff">+3€ Pfand</span>'
                    : ""
                }
              </span>
            </button>
          `
        )
        .join("");
    }

    // Init

    renderGrid();
    updateTotal();
  </script>
</body>
</html>
