<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasse</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: #141008;
            color: #f0ead6;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ── TOP: Kasse ── */
        #kasse {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .title { 
            font-size: 18px; 
            font-weight: 900; 
            letter-spacing: 1px; 
            color: #f5c842; 
        }

        #btn-reset {
            background: rgba(255, 80, 80, 0.15);
            border: 1px solid rgba(255, 80, 80, 0.3);
            border-radius: 8px;
            color: #ff7070;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
        }

        /* Cart */
        #cart-empty { 
            color: #5a5040; 
            font-size: 14px; 
            text-align: center; 
            padding: 20px 0;
            font-style: italic;
        }

        #cart-items { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }

        .cart-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 8px 12px;
        }

        .cart-emoji { font-size: 20px; flex-shrink: 0; }
        .cart-info { flex: 1; min-width: 0; }
        .cart-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cart-sub { font-size: 11px; color: #7a7060; font-weight: normal; }
        .cart-price { font-size: 12px; color: #f5c842; font-weight: 600; }
        .cart-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

        /* Pfand Bereich */
        .pfand-box {
            background: rgba(245, 200, 66, 0.07);
            border: 1px solid rgba(245, 200, 66, 0.2);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .pfand-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #f5c842;
        }

        .pfand-row { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        .pfand-count { 
            font-size: 22px; 
            font-weight: 900; 
            min-width: 30px; 
            text-align: center;
            color: #f5c842;
        }

        .pfand-unit { font-size: 12px; color: #7a7060; }
        .pfand-amount { margin-left: auto; font-size: 15px; font-weight: 800; color: #f5c842; }

        /* Total */
        #total-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .total-main {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        #total-breakdown { font-size: 10px; color: #7a7060; line-height: 1.4; }
        #total-amount { font-size: 32px; font-weight: 900; color: #f5c842; }

        .quick-btns { 
            display: flex; 
            gap: 6px; 
            flex-wrap: wrap; 
        }

        .quick-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 8px;
            color: #f0ead6;
            padding: 8px 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
        }

        #btn-passend {
            background: #f5c842;
            color: #1a1408;
            flex: 1.5;
        }

        /* Eingabe & Rückgeld */
        #eingabe-row { display: flex; gap: 8px; }
        
        #input-gegeben {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 22px;
            padding: 10px;
            font-family: inherit;
            outline: none;
        }

        #btn-ok {
            background: #f5c842;
            color: #1a1408;
            border: none;
            border-radius: 10px;
            padding: 0 24px;
            font-weight: 900;
            font-size: 22px;
            cursor: pointer;
        }

        #rueckgeld-box {
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            display: none;
            margin-top: 4px;
        }

        #rueckgeld-label { font-size: 12px; margin-bottom: 4px; }
        #rueckgeld-amount { font-size: 36px; font-weight: 900; }

        /* ── BOTTOM: Getränke ── */
        #getraenke {
            flex-shrink: 0;
            height: 45dvh;
            background: #1a1208;
            display: flex;
            flex-direction: column;
            border-top: 2px solid rgba(245, 200, 66, 0.3);
        }

        #tabs {
            display: flex;
            overflow-x: auto;
            background: rgba(0,0,0,0.2);
        }

        .tab-btn {
            flex: 1;
            padding: 14px 5px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            background: transparent;
            color: #5a5040;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
        }

        .tab-btn.active { 
            color: #f5c842; 
            border-bottom-color: #f5c842; 
            background: rgba(245, 200, 66, 0.05);
        }

        #items-grid {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            align-content: start;
        }

        .item-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 12px;
            color: #f0ead6;
            padding: 10px 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: transform 0.1s;
        }

        .item-btn:active { 
            background: rgba(245, 200, 66, 0.2); 
            transform: scale(0.95);
        }

        .item-emoji { font-size: 24px; }
        .item-name { font-size: 11px; font-weight: 700; line-height: 1.2; height: 2.4em; display: flex; align-items: center; text-align: center; }
        .item-price { font-size: 13px; font-weight: 900; color: #f5c842; }

        .qbtn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div id="kasse">
    <div class="header">
        <div class="title">🍺 FEST-KASSE</div>
        <button id="btn-reset" onclick="reset()">🗑 Reset</button>
    </div>

    <div id="cart-empty">Wähle unten Getränke aus...</div>
    <div id="cart-items"></div>

    <div class="pfand-box">
        <div class="pfand-label">Pfand-Rückgabe</div>
        <div class="pfand-row">
            <button class="qbtn" onclick="changePfandZurueck(-1)">−</button>
            <span class="pfand-count" id="pfand-zurueck-count">0</span>
            <button class="qbtn" onclick="changePfandZurueck(1)">+</button>
            <span class="pfand-unit">Stück (je 3€)</span>
            <span class="pfand-amount" id="pfand-zurueck-amount"></span>
        </div>
    </div>

    <div id="total-box">
        <div class="total-main">
            <div id="total-breakdown"></div>
            <div id="total-amount">0,00 €</div>
        </div>
        <div class="quick-btns">
            <button class="quick-btn" onclick="setGegeben(5)">5€</button>
            <button class="quick-btn" onclick="setGegeben(10)">10€</button>
            <button class="quick-btn" onclick="setGegeben(20)">20€</button>
            <button class="quick-btn" onclick="setGegeben(50)">50€</button>
            <button class="quick-btn" id="btn-passend" onclick="setPassend()">Passend</button>
        </div>
    </div>

    <div id="eingabe-row">
        <input id="input-gegeben" type="number" inputmode="decimal" placeholder="Gegeben..." oninput="onPaidInput()">
        <button id="btn-ok" onclick="calcChange()">OK</button>
    </div>

    <div id="rueckgeld-box">
        <div id="rueckgeld-label"></div>
        <div id="rueckgeld-amount"></div>
    </div>
</div>

<div id="getraenke">
    <div id="tabs">
        <button class="tab-btn active" onclick="setTab('bier', this)">BIER</button>
        <button class="tab-btn" onclick="setTab('wein', this)">WEIN/MIX</button>
        <button class="tab-btn" onclick="setTab('schnaps', this)">LONGD.</button>
        <button class="tab-btn" onclick="setTab('soft', this)">ALKOHOLFREI</button>
    </div>
    <div id="items-grid"></div>
</div>

<script>
const ITEMS = {
    bier: [
        { id:"b1", name:"Pils", size:"0,5 L", price:3.50, pfand:true, emoji:"🍺" },
        { id:"b2", name:"Radler", size:"0,5 L", price:3.50, pfand:true, emoji:"🍋" },
        { id:"b3", name:"Keiler Weizen", size:"0,5 L", price:3.50, pfand:true, emoji:"🌾" },
        { id:"b4", name:"Erdinger AF", size:"0,5 L", price:3.50, pfand:true, emoji:"🥤" },
        { id:"b5", name:"Weizen", size:"0,5 L", price:3.50, pfand:true, emoji:"🍺" },
        { id:"b6", name:"Pils Maß", size:"1,0 L", price:7.00, pfand:true, emoji:"🍺" },
        { id:"b7", name:"Radler Maß", size:"1,0 L", price:7.00, pfand:true, emoji:"🍋" },
        { id:"b8", name:"Weizen Maß", size:"1,0 L", price:7.00, pfand:true, emoji:"🌾" },
    ],
    wein: [
        { id:"w1", name:"Schoppen Wein", size:"0,3 L", price:3.50, pfand:true, emoji:"🍷" },
        { id:"w2", name:"Weinschorle", size:"0,5 L", price:5.00, pfand:true, emoji:"🥂" },
        { id:"w3", name:"Schnäpse", size:"2 cl", price:1.50, pfand:false, emoji:"🥃" },
        { id:"w4", name:"Backhaustropfen", size:"0,7 L", price:30.00, pfand:true, emoji:"🍾" },
        { id:"w5", name:"Klopfer", size:"Kiste", price:30.00, pfand:false, emoji:"🎯" },
    ],
    schnaps: [
        { id:"s1", name:"Aperol", size:"0,3 L", price:5.00, pfand:true, emoji:"🍊" },
        { id:"s2", name:"Mix + Cola kl.", size:"0,2 L", price:3.00, pfand:true, emoji:"🥃" },
        { id:"s3", name:"Mix + Cola gr.", size:"0,5 L", price:8.00, pfand:true, emoji:"🥃" },
        { id:"s4", name:"Flasche Mix", size:"0,7 L", price:40.00, pfand:true, emoji:"🍾" },
    ],
    soft: [
        { id:"af1", name:"Apfelsaft", size:"0,5 L", price:3.00, pfand:true, emoji:"🍎" },
        { id:"af2", name:"Johannisbeere", size:"0,5 L", price:3.00, pfand:true, emoji:"🫐" },
        { id:"af3", name:"Zitrolimo", size:"0,5 L", price:3.00, pfand:true, emoji:"🍋" },
        { id:"af4", name:"Orangelimo", size:"0,5 L", price:3.00, pfand:true, emoji:"🍊" },
        { id:"af5", name:"Spezi", size:"0,5 L", price:3.00, pfand:true, emoji:"🥤" },
        { id:"af6", name:"Cola", size:"0,5 L", price:3.00, pfand:true, emoji:"🥤" },
        { id:"af7", name:"Wasser", size:"0,5 L", price:3.00, pfand:true, emoji:"💧" },
    ],
};

const PFAND_WERT = 3.00;
let cart = [];
let pfandZurueck = 0;
let currentTab = 'bier';

function fmt(n) { return n.toFixed(2).replace('.', ',') + ' €'; }

function addToCart(id) {
    const item = Object.values(ITEMS).flat().find(i => i.id === id);
    const existing = cart.find(c => c.id === id);
    if (existing) existing.qty++;
    else cart.push({ ...item, qty: 1 });
    renderCart();
    updateTotal();
}

function changeQty(id, delta) {
    const i = cart.findIndex(c => c.id === id);
    if (i === -1) return;
    cart[i].qty += delta;
    if (cart[i].qty <= 0) cart.splice(i, 1);
    renderCart();
    updateTotal();
}

function renderCart() {
    const empty = document.getElementById('cart-empty');
    const items = document.getElementById('cart-items');
    if (cart.length === 0) {
        empty.style.display = 'block';
        items.innerHTML = '';
        return;
    }
    empty.style.display = 'none';
    items.innerHTML = cart.map(c => {
        const gesamt = (c.price + (c.pfand ? PFAND_WERT : 0)) * c.qty;
        return `
            <div class="cart-row">
                <span class="cart-emoji">${c.emoji}</span>
                <div class="cart-info">
                    <div class="cart-name">${c.name} <span class="cart-sub">${c.size}</span></div>
                    <div class="cart-price">${fmt(gesamt)} ${c.pfand ? '<small>(inkl. Pfand)</small>' : ''}</div>
                </div>
                <div class="cart-controls">
                    <button class="qbtn" onclick="changeQty('${c.id}',-1)">−</button>
                    <span style="font-weight:800; min-width:20px; text-align:center">${c.qty}</span>
                    <button class="qbtn" onclick="changeQty('${c.id}',1)">+</button>
                </div>
            </div>`;
    }).join('');
}

function changePfandZurueck(d) {
    pfandZurueck = Math.max(0, pfandZurueck + d);
    document.getElementById('pfand-zurueck-count').textContent = pfandZurueck;
    document.getElementById('pfand-zurueck-amount').textContent = pfandZurueck > 0 ? '−' + fmt(pfandZurueck * PFAND_WERT) : '';
    updateTotal();
}

function getTotal() {
    const getraenke = cart.reduce((s, c) => s + c.price * c.qty, 0);
    const pfandAufGetraenke = cart.reduce((s, c) => s + (c.pfand ? PFAND_WERT * c.qty : 0), 0);
    const pfandZurueckTotal = pfandZurueck * PFAND_WERT;
    return {
        getraenke,
        pfandAufGetraenke,
        pfandZurueckTotal,
        total: Math.max(0, getraenke + pfandAufGetraenke - pfandZurueckTotal)
    };
}

function updateTotal() {
    const { getraenke, pfandAufGetraenke, pfandZurueckTotal, total } = getTotal();
    document.getElementById('total-amount').textContent = fmt(total);

    let parts = [];
    if (getraenke > 0) parts.push(`Drinks: ${fmt(getraenke)}`);
    if (pfandAufGetraenke > 0) parts.push(`Pfand: +${fmt(pfandAufGetraenke)}`);
    if (pfandZurueckTotal > 0) parts.push(`Rückgabe: -${fmt(pfandZurueckTotal)}`);
    
    document.getElementById('total-breakdown').innerHTML = parts.join('<br>');
    document.getElementById('rueckgeld-box').style.display = 'none';
}

function onPaidInput() {
    document.getElementById('rueckgeld-box').style.display = 'none';
}

function setGegeben(v) {
    document.getElementById('input-gegeben').value = v;
    calcChange();
}

function setPassend() {
    const { total } = getTotal();
    document.getElementById('input-gegeben').value = total.toFixed(2);
    calcChange();
}

function calcChange() {
    const val = document.getElementById('input-gegeben').value.replace(',', '.');
    const paid = parseFloat(val);
    if (isNaN(paid)) return;
    
    const { total } = getTotal();
    const change = paid - total;
    const box = document.getElementById('rueckgeld-box');
    const lbl = document.getElementById('rueckgeld-label');
    const amt = document.getElementById('rueckgeld-amount');
    
    box.style.display = 'block';
    if (change >= -0.001) {
        box.style.background = 'rgba(80,200,100,0.15)';
        box.style.border = '1px solid #50c864';
        lbl.textContent = 'RÜCKGELD:';
        lbl.style.color = '#50c864';
        amt.style.color = '#50c864';
    } else {
        box.style.background = 'rgba(255,80,80,0.15)';
        box.style.border = '1px solid #ff5050';
        lbl.textContent = 'ES FEHLEN:';
        lbl.style.color = '#ff7070';
        amt.style.color = '#ff7070';
    }
    amt.textContent = fmt(Math.abs(change));
}

function reset() {
    if(cart.length > 0 && !confirm("Warenkorb wirklich leeren?")) return;
    cart = []; 
    pfandZurueck = 0;
    document.getElementById('pfand-zurueck-count').textContent = '0';
    document.getElementById('pfand-zurueck-amount').textContent = '';
    document.getElementById('input-gegeben').value = '';
    document.getElementById('rueckgeld-box').style.display = 'none';
    renderCart();
    updateTotal();
}

function setTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid();
}

function renderGrid() {
    const grid = document.getElementById('items-grid');
    grid.innerHTML = ITEMS[currentTab].map(item => `
        <button class="item-btn" onclick="addToCart('${item.id}')">
            <span class="item-emoji">${item.emoji}</span>
            <span class="item-name">${item.name}</span>
            <span class="item-price">${fmt(item.price)}</span>
            ${item.pfand ? '<span style="font-size:9px;color:#60a0ff">+3€ Pfand</span>' : ''}
        </button>
    `).join('');
}

// Initialisierung
renderGrid();
updateTotal();
</script>

</body>
</html>
